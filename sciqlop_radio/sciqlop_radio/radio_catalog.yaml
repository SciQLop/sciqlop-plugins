# radio_catalog.yaml — curated space-mission radio dynamic spectra (data from Speasy).
# Entries absent from the installed Speasy inventory are skipped-with-log.
#
# Catalog paths use nested title-case `radio/<Mission>/<Instrument>/<Band>/<Unit>`;
# continuous.py registers separately under flat lowercase `radio/eovsa` and
# `radio/ilofar` (ground-based receivers with no calibrated Speasy
# equivalent). The two are structurally disjoint by convention — never
# reuse those exact flat paths here (the shipped-file test enforces this).
# PSP/RFS used to be a continuous VP too, but is now served exclusively
# via the curated PSP/FIELDS/RFS_* entries below (CDA L3 calibrated).
# Where the same product ships both flux-density and solar-flux-unit forms
# (PSP RFS L3, STEREO SWAVES L3, Solar Orbiter RPW L3), both are exposed
# side by side: SFU is the convention in solar radio astronomy
# (1 SFU = 1e-22 W·m⁻²·Hz⁻¹), FLUX is the SI form preferred in fields/plasma
# physics. Plot styling inherits the right colorbar units from each
# variable's Speasy metadata.

# PSP / FIELDS / RFS — L3 calibrated (CDAWeb)
- path: PSP/FIELDS/RFS_LFR/FLUX
  speasy_id: cda/PSP_FLD_L3_RFS_LFR/psp_fld_l3_rfs_lfr_PSD_FLUX
  label: PSP/FIELDS RFS LFR (PSD flux)

- path: PSP/FIELDS/RFS_LFR/SFU
  speasy_id: cda/PSP_FLD_L3_RFS_LFR/psp_fld_l3_rfs_lfr_PSD_SFU
  label: PSP/FIELDS RFS LFR (PSD, SFU)

- path: PSP/FIELDS/RFS_HFR/FLUX
  speasy_id: cda/PSP_FLD_L3_RFS_HFR/psp_fld_l3_rfs_hfr_PSD_FLUX
  label: PSP/FIELDS RFS HFR (PSD flux)

- path: PSP/FIELDS/RFS_HFR/SFU
  speasy_id: cda/PSP_FLD_L3_RFS_HFR/psp_fld_l3_rfs_hfr_PSD_SFU
  label: PSP/FIELDS RFS HFR (PSD, SFU)

# Wind/WAVES — L2 power spectral density (CDAWeb) — no SFU variant
- path: Wind/WAVES/RAD1
  speasy_id: cda/WI_L2_WAV_RAD1/PSD_V2_S
  label: Wind/WAVES RAD1 (20–1040 kHz)

- path: Wind/WAVES/RAD2
  speasy_id: cda/WI_L2_WAV_RAD2/PSD_V2_S
  label: Wind/WAVES RAD2 (1.075–13.825 MHz)

- path: Wind/WAVES/TNR
  speasy_id: cda/WI_L2_WAV_TNR/PSD_V2
  label: Wind/WAVES TNR (4–245 kHz)

