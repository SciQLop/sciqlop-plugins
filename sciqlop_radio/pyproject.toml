[build-system]
requires = ["setuptools>=68.0"]
build-backend = "setuptools.build_meta"

[project]
name = "sciqlop-radio"
version = "0.1.0"
description = "Heliospheric radio dynamic-spectra browser for SciQLop (wraps sunpy.radiospectra)"
requires-python = ">=3.10"
dependencies = [
    "SciQLop>=0.12.0,<0.13.0",
    # radiospectra 0.6.1 calls sunpy.net.scraper.Scraper with the legacy
    # `url, regex=True` signature; sunpy 7.x made `format` a required
    # positional arg, so radiospectra's Fido clients (RFS, eCALLISTO,
    # ILOFAR, RSTN, EOVSA) silently return zero rows on sunpy >= 7. Pin
    # to 6.x until radiospectra catches up.
    "sunpy[net]>=6.0,<7",
    "radiospectra>=0.6,<1.0",
    "astropy",
    "numpy>=1.24",
    "pydantic>=2.0",
    "speasy>=1.7",
    "pyyaml",
]

[project.optional-dependencies]
test = ["pytest", "pytest-qt"]

[project.entry-points."sciqlop.plugins"]
sciqlop_radio = "sciqlop_radio"

[tool.setuptools.packages.find]
include = ["sciqlop_radio*"]

[tool.setuptools.package-data]
sciqlop_radio = ["plugin.json", "radio_catalog.yaml"]
